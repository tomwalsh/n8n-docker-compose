services:

  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n} -d ${POSTGRES_DB:-n8n}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  main:
    image: n8nio/n8n:2.10.4
    restart: always
    ports:
      - "5678:5678"

    environment:
      # PostgreSQL as our data storage
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}

      # Redis as our queue broker
      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379

      # Pushing operations to worker instance
      OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS: "true"

      # Add this to main so that it doesn't complain, even though worker handles this
      N8N_RUNNERS_MODE: "external"
      N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN}

      # You can remove this if you use HTTPS
      N8N_SECURE_COOKIE: "false"

      # This is supposed to allow for custom nodes, but doesn't work
      N8N_CUSTOM_EXTENSIONS: /home/node/.n8n/custom
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"

      GENERIC_TIMEZONE: ${TIMEZONE:-America/New_York}
      TZ: ${TIMEZONE:-America/New_York}

    volumes:
      - ./data/n8n:/home/node/.n8n
      - ./data/n8n/custom:/home/node/.n8n/custom
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s # Grace period for initialization

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: n8nio/n8n:2.10.4
    restart: always
    command: worker

    environment:
      # PostgreSQL
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      
      # Redis Queues
      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379

      # The worker handles the runner brokers
      N8N_RUNNERS_MODE: "external"
      N8N_RUNNERS_BROKER_LISTEN_ADDRESS: "0.0.0.0"
      N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN}
      # This is shared with the main instance
      N8N_CUSTOM_EXTENSIONS: /home/node/.n8n/custom
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}

      GENERIC_TIMEZONE: ${TIMEZONE:-America/New_York}
      TZ: ${TIMEZONE:-America/New_York}

    volumes:
      - ./data/n8n:/home/node/.n8n
      - ./data/n8n/custom:/home/node/.n8n/custom

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      main:
        condition: service_healthy

  runner:
    image: n8nio/runners:2.10.4
    restart: always

    environment:
      N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN}
      # Runners report to worker, not main.
      N8N_RUNNERS_TASK_BROKER_URI: http://worker:5679

      # These don't currently work
      # use the custom-n8n-task-runners.json instead
      N8N_RUNNERS_STDLIB_ALLOW: "*" 
      NODE_FUNCTION_ALLOW_BUILTIN: "*"
      
      GENERIC_TIMEZONE: ${TIMEZONE:-America/New_York}
      TZ: ${TIMEZONE:-America/New_York}

    volumes:
      # Volume mount of custom n8n-task-runners.json file because the ENV vars don't work
      - ./custom-n8n-task-runners.json:/etc/n8n-task-runners.json:ro

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      worker:
        condition: service_started